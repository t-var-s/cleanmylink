<!doctype html>
<html lang="en">
  <head>
    <!-- app-head -->
  </head>
  <body>
    <a class="settings-link" href="/settings.html" aria-label="Open settings">
      <img src="/assets/icon_settings.webp" alt="" width="318" height="318">
    </a>

    <main class="app-shell">
      <div class="app-column">
        <section class="hero-stage">
          <div class="app-panel app-panel-hero">
            <div class="hero-copy">
              <p class="eyebrow">Clipboard utility</p>
              <h1 id="status-message" class="status-message" aria-live="polite">
                Remove junk parameters from any URL you've just copied.
              </h1>
            </div>

            <button id="clean-button" class="clean-button" type="button">
              <span class="clean-button-label">Clean My Copied Link</span>
              <span class="button-loading" aria-hidden="true">
                <span class="button-spinner"></span>
              </span>
            </button>

            <p class="hero-credit">
              Web app built by
              <a href="https://viewfromtheweb.com" target="_blank" rel="noopener noreferrer">Ricardo Tavares</a>
            </p>
          </div>
        </section>

        <section class="app-panel history-section" aria-labelledby="history-heading">
          <div class="history-header">
            <div>
              <p class="section-label">Recent Links</p>
              <h2 id="history-heading">Saved for 72 hours.</h2>
            </div>
          </div>
          <div class="history-body">
            <ul id="history-list" class="history-list"></ul>
            <p id="history-empty" class="history-empty" aria-live="polite">Loading saved links from this device...</p>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
