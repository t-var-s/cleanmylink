version: 1
verified_on: 2026-04-15

automated:
  - id: transforms-tracking-params
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanUrl removes generic tracking parameters
      - cleanUrl preserves unrelated query parameters

  - id: transforms-settings-metadata
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - transform definitions expose stable ids
      - transform definitions expose labels, types, and default enabled state for settings UI
      - site-rule transform definitions expose domain labels for settings UI

  - id: storage-domain-transform-settings
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - domain transform settings persist through the shared storage adapter
      - only site-rule transform ids are serialized
      - global cleanup transform ids are ignored

  - id: storage-domain-settings-global-cleanup
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - disabled domain transforms are composed with default global cleanup settings
      - tracking parameter cleanup remains enabled even if a saved settings payload includes it as disabled

  - id: storage-domain-settings-malformed
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - malformed domain settings storage falls back to default-enabled site rules

  - id: storage-domain-settings-defaults
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - missing domain transform ids fall back to default-enabled site rules
      - invalid non-boolean domain transform values fall back to defaults

  - id: storage-indexeddb-adapter
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - IndexedDB-backed storage persists history entries
      - IndexedDB-backed storage persists domain transform settings
      - IndexedDB-backed domain settings serialize only site-rule transform ids

  - id: storage-indexeddb-migration
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - missing IndexedDB history is copied from localStorage and returned
      - missing IndexedDB domain settings are copied from localStorage and returned
      - existing IndexedDB values take precedence over localStorage migration values
      - localStorage migration values are left in place after copy

  - id: storage-indexeddb-fallback
    type: unit
    file: test/storage.test.js
    command: npm test
    covers:
      - localStorage-compatible storage is used when IndexedDB cannot open

  - id: transforms-disabled-tracking-params
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanUrl can leave tracking parameters in place when the transform is disabled

  - id: transforms-x-rewrite
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanUrl rewrites x.com status URLs to fxtwitter.com

  - id: transforms-disabled-x-rewrite
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanUrl can leave x.com status URLs unchanged when the transform is disabled

  - id: transforms-x-article-exception
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - x.com article URLs are not host-rewritten
      - tracking cleanup still runs on article URLs

  - id: transforms-reddit-rewrite
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanUrl rewrites reddit.com URLs to redlib.freedit.eu

  - id: transforms-youtube-v-only
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanUrl keeps only the v parameter on YouTube watch URLs

  - id: transforms-whitespace-split-url
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanInput treats whitespace-split URLs as URLs
      - cleanInput removes whitespace from URL candidates before parsing

  - id: transforms-text-normalization
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanText collapses repeated whitespace
      - cleanText converts all-caps text to sentence case

  - id: transforms-disabled-text-case
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - cleanText can leave all-caps text unchanged when the sentence-case transform is disabled

  - id: transforms-http-allowlist
    type: unit
    file: test/transforms.test.js
    command: npm test
    covers:
      - parseUrl accepts http and https URLs
      - parseUrl rejects non-http schemes

  - id: app-import-without-dom-side-effects
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app module can be imported in Node without querying browser DOM globals
      - app bootstrapping is separated from app factory exports

  - id: app-history-loading-state
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app keeps the saved-links loading copy visible until history storage resolves
      - app clears the history loading busy state after startup history loading completes

  - id: app-history-read-fallback
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app falls back to an empty in-memory history when saved history cannot be read
      - app logs history storage read failures without breaking startup

  - id: app-history-pruning
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app drops expired history entries during startup
      - app drops unsafe non-HTTP history URLs during startup
      - app writes pruned history entries back to storage

  - id: app-history-deduplication
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app de-duplicates saved URLs so the newest clean wins
      - app ignores unsafe URLs when saving history

  - id: app-history-limit
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app caps saved history at 100 entries
      - saving a new URL pushes the oldest over-limit history entry out of storage

  - id: app-clipboard-cleaning
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - app cleans clipboard URLs with saved domain-transform settings
      - app writes cleaned URL output back to the clipboard
      - app saves cleaned URL results to history
      - app writes cleaned plain-text output back to the clipboard
      - app does not save plain-text results to history

  - id: app-clipboard-edge-states
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - unchanged valid URL input still reports "All clear!"
      - unexpected clipboard failures report the generic failure message
      - the primary button is restored after an unexpected clipboard failure

  - id: app-history-responsive-ordering
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - desktop history renders newest entries first
      - mobile history renders older entries above newer entries so the newest is closest to the action area

  - id: app-history-share-actions
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - saved history entries call navigator.share with entry-derived URL data when the Web Share API can share them
      - saved history entries keep safe external-link attributes even when sharing is available
      - saved history links keep normal navigation behavior when the Web Share API is unavailable
      - saved history links keep normal navigation behavior when navigator.canShare rejects the entry payload
      - user-cancelled saved history shares are ignored without app errors

  - id: app-pwa-update-actions
    type: unit
    file: test/app.test.js
    command: npm test
    covers:
      - waiting service workers switch the primary button into offline retry mode when the device is offline
      - waiting service workers switch the primary button into update mode when the device is online
      - update activation posts a SKIP_WAITING message to the waiting worker

  - id: settings-controller-domain-settings
    type: unit
    file: test/settings.test.js
    command: npm test
    covers:
      - settings app renders one toggle for each site-rule transform
      - settings app stages checkbox changes in memory without writing storage
      - settings app updates the save label when staged settings differ
      - settings app writes domain-transform settings only on submit
      - settings app returns to the main cleaning page after a successful save
      - settings app reports storage write failures without navigating

  - id: build-output-excludes-source-only-directories
    type: build
    file: test/build.test.js
    command: npm test
    covers:
      - dist contains the deployable app files
      - dist contains the settings page
      - dist excludes references, test, scripts, and src directories

  - id: build-generates-service-worker
    type: build
    file: test/build.test.js
    command: npm test
    covers:
      - generated sw.js includes a stamped cache version
      - generated sw.js includes built app shell assets
      - generated sw.js includes the settings page and settings entry
      - generated sw.js does not include unreplaced placeholders

  - id: build-generates-page-head-metadata
    type: build
    file: test/build.test.js
    command: npm test
    covers:
      - built HTML pages receive shared head metadata from the Vite page registry
      - built HTML pages receive page-specific title and description metadata
      - built HTML pages do not contain the source app-head marker
      - built HTML pages use Vite-fingerprinted stylesheet assets

  - id: build-netlify-csp-alignment
    type: build
    file: test/build.test.js
    command: npm test
    covers:
      - the Netlify Content-Security-Policy response header matches the shared app CSP policy string

manual_verified:
  - id: browser-clean-url-success
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - open http://127.0.0.1:5173
      - grant clipboard-read and clipboard-write permissions for that origin
    steps:
      - write "https://example.com/path?utm_source=test&keep=1" to the clipboard
      - click "Clean My Copied Link"
    expected:
      - status becomes "All clear!"
      - clipboard becomes "https://example.com/path?keep=1"
      - one history item is saved

  - id: browser-empty-clipboard
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - grant clipboard-read and clipboard-write permissions
      - ensure local storage is empty
      - write an empty string to the clipboard
    steps:
      - click "Clean My Copied Link"
    expected:
      - status becomes "No text was found in your clipboard."
      - no history item is created

  - id: browser-text-cleanup
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - grant clipboard-read and clipboard-write permissions
      - write "HELLO   WORLD.\nTHIS IS FINE." to the clipboard
    steps:
      - click "Clean My Copied Link"
    expected:
      - clipboard becomes "Hello world. This is fine."
      - status becomes "All clear!"
      - history remains unchanged because the result is not a URL

  - id: browser-site-rules
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - grant clipboard-read and clipboard-write permissions
    steps:
      - clean "https://x.com/someuser/status/42?utm_source=social"
      - clean "https://www.youtube.com/watch?v=abc123&utm_source=newsletter&t=90"
    expected:
      - x.com result becomes "https://fxtwitter.com/someuser/status/42"
      - YouTube result becomes "https://www.youtube.com/watch?v=abc123"
      - both cleaned URLs appear in recent links

  - id: browser-settings-domain-rules
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - open http://127.0.0.1:5173
      - grant clipboard-read and clipboard-write permissions
    steps:
      - open settings from the top-right icon
      - turn off the reddit.com domain transform
      - confirm the save label changes to "Save changes and go back to cleaning"
      - click the save button
      - clean "https://www.reddit.com/r/node/comments/abc123/post?utm_source=share&keep=ok"
    expected:
      - navigation returns to the main cleaning page
      - clipboard becomes "https://www.reddit.com/r/node/comments/abc123/post?keep=ok"
      - tracking cleanup still applies
      - the reddit.com host rewrite does not apply

  - id: browser-settings-responsive-layout
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - open http://127.0.0.1:5173/settings.html
    steps:
      - review the settings page at a mobile viewport around 390x844
      - review the settings page at a desktop viewport around 1440x900
      - review the main page at the same mobile and desktop viewports
    expected:
      - toggle text fits without overflow
      - the save label fits beside the square save icon button
      - the settings icon stays in the top-right corner on mobile without blocking primary controls
      - the settings icon stays in the bottom-right corner on desktop without blocking primary controls

  - id: browser-history-layout-ordering
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - grant clipboard-read and clipboard-write permissions
      - clean at least two distinct URLs
    steps:
      - view the app at a mobile viewport around 390x844
      - view the app again at a desktop viewport wider than 960px
    expected:
      - mobile layout renders older cleaned links above newer ones and keeps the newest near the action panel
      - desktop layout renders newest links first

  - id: browser-safe-history-links
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - grant clipboard-read and clipboard-write permissions
      - create at least one history entry
    steps:
      - use a browser where the Web Share API is unavailable for the saved link
      - inspect and tap a rendered history link
    expected:
      - target is "_blank"
      - rel is "noopener noreferrer"
      - the saved link opens in a new tab

  - id: browser-history-share-api
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start on a browser or device with Web Share API support
      - grant clipboard-read and clipboard-write permissions
      - create at least one history entry
    steps:
      - tap a rendered history link
    expected:
      - the saved link opens the native share sheet instead of a new tab
      - the shared payload contains the saved URL

  - id: browser-blocked-clipboard-state
    type: browser
    tool: playwright-cli
    setup:
      - start the app with npm run start
      - open the page without clipboard-read permission
    steps:
      - click "Clean My Copied Link"
    expected:
      - status becomes "Clipboard access is blocked. Try allowing clipboard permissions."

  - id: browser-pwa-basics
    type: browser
    tool: playwright-cli
    setup:
      - build the app with npm run build
      - start the production preview with npm run preview
      - open http://127.0.0.1:4173
    steps:
      - wait for the page to settle
      - inspect service worker registrations
      - fetch manifest.webmanifest from the app origin
    expected:
      - one active service worker is registered for http://127.0.0.1:4173/
      - manifest.webmanifest responds with HTTP 200

gaps:
  - clipboard permission-denied handling is still covered by manual browser verification rather than automated browser tests
  - service worker registration, update lifecycle, and offline cache reuse are still covered by manual browser verification rather than automated browser tests
  - reduced-motion behavior is still covered by CSS review rather than automated browser tests
