    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">

    <title>Clean My Link Settings</title>

  <body class="settings-page">
    <main class="settings-shell">
      <form id="settings-form" class="settings-panel" autocomplete="off">
        <div class="settings-header">
          <h1>Domain transforms</h1>
          <p>Choose which domain fixes stay on.</p>
        </div>

        <ul id="settings-list" class="settings-list" aria-label="Domain transformations"></ul>

        <p id="settings-status" class="settings-status" aria-live="polite"></p>

        <div class="settings-save-row">
          <button class="settings-save-button" type="submit" aria-labelledby="settings-save-label">
            <img src="/assets/icon_save.webp" alt="" width="318" height="318">
          </button>
          <span id="settings-save-label">Confirm and go back to cleaning</span>
        </div>
      </form>
    </main>

    <script type="module" src="/src/settings-main.js"></script>
  </body>
